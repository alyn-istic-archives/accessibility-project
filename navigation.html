<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS and SST beta</title>
<link rel="stylesheet" href="bleh.css">
<link rel="stylesheet" href="camera.css">
</head>
<body>



<header>
    <div class="logo">yum</div>
</header>

<main >

  <!-- ── IDLE ── -->

    <div id="status">Ready</div>
    
    <button id = "narration-btn" onclick="toggleNarration()"> narration: on</button>
    <button id="micBtn" onclick="startMic()">🎤 Start Listening</button>
    <button id="speakBtn" onclick="speakText()" onmouseover="speak('hover over speakbutton')">🔊 Speak Text</button>
    <button id="clearBtn" onclick="clearText()">🗑️ Clear</button>

    <textarea id="textBox" placeholder="Your speech will appear here, or type something to speak..."></textarea>
    
  <!-- Camera panel -->

    <div class="camera-wrapper">
        <img src="images/frame.png"  class="frame" width="600" height = "400">
          <video id="video-preview" autoplay muted playsinline width></video>
          <canvas id = "gesture-canvas"></canvas>
    </div>
    <div  id = "photobooth-output">
    </div>
 
    <!-- Gesture detection readout -->
    <div class = "legend"">
      <span>GESTURE: </span>
      <span>No gesture</span>
    </div>
 
    <!-- Gesture reference -->
    <div class = "legend">
      👍 thumbs up → speak text<br>
      ✌️ peace sign → start mic<br>
      👊 fist → clear text
    </div>
    <div class="download-btn-container">
        <button type="button" id="captureButton">Capture </button>

        <button id="retakePicturesButton">Re-take</button>

        <button id="downloadButton">Download Photobooth </button>
      </div>
 
    <!-- Transcript -->
    <div class="panel transcript-panel">
      <div class="panel-label">LIVE TRANSCRIPT</div>
      <div id="transcript"><span style="color:var(--muted);font-family:'Space Mono',monospace;font-size:0.8rem;">Waiting for speech…</span></div>
    </div>

    <script src="stt.js"></script>
    <script src="tts.js"></script>
    <script type="module" src = "camera.js"></script>

</main>
</body>
</html>
