<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAPSHOT: beta</title>

<link rel="icon" type="image/x-icon" href="images/icon.ico">
<link rel="stylesheet" href="camera.css">
<link rel="stylesheet" href="bleh.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>


<header>
  <a class="logo" href="index.html">SNAPSHOT</a>
</header>


<main id = "app">

    
  <div class = "btn-container">
    <button id = "narration-btn" onclick="toggleNarration()"onmouseover="speak('toggle narration?')"> Narration: ---</button>
    <!-- <button id="speakBtn" onclick="speakText()" onmouseover="speak('hover over speakbutton')">🔊 Speak Text</button>
    <button id="clearBtn" onclick="clearText()">🗑️ Clear</button>

    <textarea id="textBox" placeholder="Your speech will appear here, or type something to speak..."></textarea> -->
    <button id = "previous-frame-button" onclick = "speak('previous frame')"> < </button>
    <button id = "next-frame-button"onclick = "speak('next frame')"> > </button>
    <button id = "help" onmouseover="speak('click 4 gestures')" onclick="speak('peace sign to capture photos, thumbs up to download, pointer up to change frames, fist to camera to retake!')">help</button>
  </div>

  <div class="btn-container">
        <button type="button" id="captureButton"onmouseover="speak('take photos')">Capture </button>

        <button id="retakePicturesButton"onmouseover="speak('retake photos')">Re-take</button>

        <button id="downloadButton"onmouseover="speak('download photos')">Download Photobooth </button>
  </div>

  

  <div class = "photo-container">
    <div id = "photobooth-output"> 
    </div>
    <div class="camera-wrapper">
    
        <img src = "images/frame.png" id = "frame" class="frame">
  
          <video id="video-preview" autoplay muted playsinline width></video>
          <canvas id = "gesture-canvas"></canvas>
    </div>
  </div>

 
    <div id = "legend">
      <span>GESTURE GUIDE:</span>
      ✌️ peace sign → capture photos x 4<br>
      👍 thumbs up → download photos<br>
      👆 point up → change frames (x/4)<br>
      ✊ fist → retake photos
    </div>



    <script src="tts.js"></script>
    <script type="module" src = "camera.js"></script>

</main>
</body>
</html>
